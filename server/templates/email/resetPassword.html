<!doctype html>
<html>
  <body style="margin:0;padding:0;background:#f4f7fb;font-family:Arial,sans-serif;color:#0f172a;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="padding:24px 12px;">
      <tr>
        <td align="center">
          <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:640px;background:#ffffff;border:1px solid #dbe4ef;border-radius:14px;overflow:hidden;">
            <tr>
              <td style="padding:20px 24px;background:#1d4ed8;color:#ffffff;">
                <h1 style="margin:0;font-size:22px;">Reset Your Password</h1>
              </td>
            </tr>
            <tr>
              <td style="padding:24px;">
                <p style="margin:0 0 12px 0;">Hi {{name}},</p>
                <p style="margin:0 0 16px 0;line-height:1.6;">We received a password reset request for your account.</p>
                <p style="margin:0 0 16px 0;line-height:1.6;">Click the link below to reset your password:</p>
                <p style="margin:0 0 16px 0;word-break:break-all;"><a href="{{resetUrl}}">{{resetUrl}}</a></p>
                <p style="margin:0 0 16px 0;line-height:1.6;">This link expires in <strong>{{expiresMinutes}} minutes</strong>.</p>
                <p style="margin:0;color:#64748b;font-size:13px;">If you did not request this, you can ignore this email.</p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
